<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Forgot Password</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 40px; background-color: #f4f4f4; }
    .container { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    h1 { text-align: center; color: #333; }
    form { display: flex; flex-direction: column; }
    input { margin: 10px 0; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
    button { padding: 10px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background: #0056b3; }
    a { text-align: center; margin-top: 10px; color: #007bff; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .message { text-align: center; margin-top: 10px; font-weight: bold; }
    .loading { text-align: center; margin-top: 10px; color: blue; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Reset Password</h1>
    <form id="forgotForm">
      <input type="text" name="email" placeholder="Enter your email" required>
      <button type="submit" id="submitBtn">Send Reset Link</button>
    </form>
    <div id="message" class="message"></div>
    <div id="loading" class="loading" style="display: none;">Sending email...</div>
  </div>
  <script>
    document.getElementById('forgotForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const submitBtn = document.getElementById('submitBtn');
      const messageDiv = document.getElementById('message');
      const loadingDiv = document.getElementById('loading');
      const form = document.getElementById('forgotForm');

      // Show loading
      submitBtn.disabled = true;
      submitBtn.textContent = 'Sending...';
      loadingDiv.style.display = 'block';
      messageDiv.innerText = '';

      try {
        const data = new URLSearchParams();
        data.append('email', e.target.email.value);
        const res = await fetch('/forgot-password', {
          method: 'POST',
          body: data,
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
        });
        const result = await res.json();

        // Hide loading
        loadingDiv.style.display = 'none';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Send Reset Link';

        if (result.error) {
          messageDiv.innerText = `Error: ${result.error}`;
          messageDiv.style.color = 'red';
        } else {
          messageDiv.innerText = result.message;
          messageDiv.style.color = 'green';
          form.style.display = 'none'; // Hide form on success
        }
      } catch (error) {
        // Hide loading
        loadingDiv.style.display = 'none';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Send Reset Link';

        messageDiv.innerText = 'Network error. Please try again.';
        messageDiv.style.color = 'red';
        console.error('Fetch error:', error);
      }
    });
  </script>
</body>
</html>
